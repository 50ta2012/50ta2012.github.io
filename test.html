<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="webjars/jquery/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/css/bootstrap.min.css" />
    <!-- bootstrap dropdown manu need "bootstrap.bundle" -->
    <script type="text/javascript" src="webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
    <title>Test</title>

    <style>
        .header {
            grid-area: header;
            background-color: #f8f9fa !important;
        }

        .menu {
            grid-area: menu;
            background-color: #f8f9fa !important;
        }

        .main {
            grid-area: main;
        }

        .right {
            grid-area: right;
        }

        .footer {
            grid-area: footer;
        }

        .grid-container {
            display: grid;
            grid-template-areas:
                'header header header header header header'
                'menu main main main main main';
            /* grid-gap: 0.05em; */
            grid-gap: 2px;
            /* Grid color */
            background-color: #dddddd;

            /* padding: 10px; */

        }

        /* Element in grid */
        .grid-container>div {
            /* background-color: rgba(255, 255, 255, 2.0); */

            background-color: #ffffff;
            /* text-align: center; */
            padding: 10px;
            /* font-size: 30px; */
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="header"">Header</div>
        <div class="menu">Menu</div>
        <div class="main">Main</div>
        <!-- <div class="right">Right</div>
        <div class="footer">Footer</div> -->
    </div>

    <script>
        autoResizeMain();

        $(window).on('resize', function () {
            autoResizeMain();
        });

        function autoResizeMain() {
            var windowHeight = $(window).height();
            var headerHeight = $(".header").height();
            var mainOutside = $(".main").outerHeight() - $(".main").height();
            var mainHeight = windowHeight - headerHeight - mainOutside;

            $(".main").css("min-height", mainHeight);
        }
    </script>
</body>

</html>
