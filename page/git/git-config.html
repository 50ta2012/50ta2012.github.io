<body>
  <div class="git-sidebar"></div>
  <main>
    <h1>使用者和信箱設定</h1>
    <p>查看 git 的設定：</p>
    <pre class="prettyprint"><code>$ git config --list</code></pre>

    <p>設定使用者名稱和信箱：</p>
    <pre class="prettyprint"><code>$ git config --global user.name "BullPaPa"
$ git config --global user.email "bullpapa@email.com"</code></pre>

  </main>
</body>
