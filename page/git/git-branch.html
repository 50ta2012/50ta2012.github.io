<main>
    <h1>使用分支</h1>

    <p>列出目前專案有哪些分支：</p>
    <div class="code-block">
    <pre class="prettyprint"><code>$ git branch</code></pre>
    </div>

    <p>在目前位置新增分支 cat：</p>
    <div class="code-block">
    <pre class="prettyprint"><code>$ git branch cat</code></pre>
    </div>

    <p>將分支 cat 改名為 tiger：</p>
    <div class="code-block">
    <pre class="prettyprint"><code>$ git branch -m cat tiger</code></pre>
    </div>

    <p>刪除分支 cat：</p>
    <div class="code-block">
    <pre class="prettyprint"><code>$ git branch -d cat</code></pre>
    </div>

    <p>切換到分支 tiger：</p>
    <div class="code-block">
    <pre class="prettyprint"><code>$ git checkout tiger</code></pre>
    </div>
</main>
