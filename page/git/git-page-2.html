<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git 版本控制 2.0</title>

    <script type="text/javascript" src="/webjars/jquery/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/css/bootstrap.min.css" />
    <script type="text/javascript" src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/google/code-prettify@master/loader/run_prettify.js"></script>

    <link rel="stylesheet" href="css/git-page-2.css">
</head>

<body>
    <div class="grid-container">
        <div class="header"">
            <nav class=" navbar navbar-light bg-light" style="padding: 0;">
            <a class="navbar-brand" href="/">
                <img src="/image/logo.svg" alt="my-logo" width="50%" height="50%">
            </a>
            </nav>
        </div>

        <div class=" menu">
            <button id="git-introduction">介紹</button>
            <button id="git-config">使用者和信箱設定</button>
            <button id="git-init">開始版本控制</button>
        </div>
        <div class="main">
            <div class="tab-content">
                <div id="welcome">
                    <main>
                        <h1>歡迎</h1>
                        <p>這裡是 Git 版本控制頁面，點擊左側的按鈕前往分頁。</p>
                    </main>
                </div>
            </div>
        </div>
        <!-- <div class="right">Right</div>
        <div class="footer">Footer</div> -->
    </div>

    <script>
        autoResizeMain();

        $(window).on('resize', function () {
            autoResizeMain();
        });

        function autoResizeMain() {
            var windowHeight = $(window).height();
            var headerHeight = $(".header").height();
            var mainOutside = $(".main").outerHeight() - $(".main").height();
            var mainHeight = windowHeight - headerHeight - mainOutside;

            $(".main").css("min-height", mainHeight);
        }
    </script>
    <script src="js/git-page.js"></script>
</body>

</html>
